name: Docs

on:
  push:
  pull_request:

jobs:
  docs:
    name: Docs Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install LaTeX dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-pictures texlive-fonts-recommended ghostscript

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install sphinx sphinxcontrib-bibtex sphinxcontrib-tikz
          python -m pip install .

      - name: Build docs with warnings as errors
        run: make -C docs html SPHINXOPTS="-W"
